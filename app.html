<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidan | Discover</title>
    <style>
        /* Base App Styling */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .app-shell { width: 100%; max-width: 400px; background: white; display: flex; flex-direction: column; position: relative; }
        
        /* Navigation Header */
        .app-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; border-bottom: 1px solid #eee; background: white;
        }
        .header-link { font-size: 24px; cursor: pointer; text-decoration: none; color: #555; transition: 0.2s; }
        .header-link:hover { color: #fd5068; }
        .logo-text { font-size: 22px; color: #fd5068; font-weight: 800; letter-spacing: 1px; }

        /* Card Stack Container */
        .card-zone { flex-grow: 1; position: relative; margin: 20px; }
        .card { 
            position: absolute; width: 100%; height: 100%; border-radius: 15px; 
            overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
            background: white;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .info { position: absolute; bottom: 0; padding: 25px 20px; color: white; background: linear-gradient(transparent, rgba(0,0,0,0.9)); width: 100%; }
        
        /* Swipe Buttons */
        .btns { display: flex; justify-content: space-evenly; padding: 25px 10px; border-top: 1px solid #f8f8f8; }
        .btn { 
            width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; 
            font-size: 28px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; 
        }
        .btn:active { transform: scale(0.9); }

        /* Match Overlay */
        .match-modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column;
            justify-content: center; align-items: center; color: white; text-align: center;
        }
        .match-modal h1 { font-size: 45px; color: #1be4a1; margin-bottom: 10px; font-style: italic; }
        .match-btn { 
            padding: 15px 45px; border-radius: 30px; border: none; 
            background: linear-gradient(45deg, #fd5068, #ff7854); 
            color: white; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="app-header">
            <a href="profile.html" class="header-link">👤</a>
            <span class="logo-text">KIDAN</span>
            <a href="chat.html" class="header-link">💬</a>
        </header>
        
        <div class="card-zone" id="stack"></div>
        
        <div class="btns">
            <button class="btn" style="color: #fd5068;" onclick="swipe('left')">✖</button>
            <button class="btn" style="color: #1be4a1;" onclick="swipe('right')">❤</button>
        </div>

        <div id="matchModal" class="match-modal">
            <h1>It's a Match!</h1>
            <p id="matchText">You and Mellat liked each other.</p>
            <button class="match-btn" onclick="closeMatch()">KEEP SWIPING</button>
        </div>
    </div>

    <script>
        const data = [
            { n: 'Mellat', a: 22, i: 'images/mellat.png', m: true },
            { n: 'Abel', a: 25, i: 'images/abel.png', m: false },
            { n: 'Hanna', a: 23, i: 'images/hanna.png', m: true },
            { n: 'Daniel', a: 27, i: 'images/daniel.png', m: false },
            { n: 'Helen', a: 21, i: 'images/helen.png', m: true },
            { n: 'Konjit', a: 24, i: 'images/konjit.png', m: false }
        ];

        let index = 0;
        const stack = document.getElementById('stack');

        function init() {
            data.forEach((u, i) => {
                const c = document.createElement('div');
                c.className = 'card';
                c.style.zIndex = data.length - i;
                c.innerHTML = `<img src="${u.i}"><div class="info"><h3>${u.n}, ${u.a}</h3><p>Ethiopia</p></div>`;
                stack.appendChild(c);
            });
        }

        function swipe(dir) {
            const cards = document.getElementsByClassName('card');
            if(cards.length > 0) {
                const top = cards[0];
                const current = data[index];

                if (dir === 'right' && current.m) {
                    showMatch(current.n);
                }

                top.style.transform = dir === 'right' ? 'translateX(600px) rotate(30deg)' : 'translateX(-600px) rotate(-30deg)';
                top.style.opacity = '0';
                
                setTimeout(() => {
                    top.remove();
                    index++;
                    if(index >= data.length) {
                        stack.innerHTML = "<div style='text-align:center; padding-top:100px; color:#aaa;'>No one new nearby!</div>";
                    }
                }, 500);
            }
        }

        function showMatch(name) {
            document.getElementById('matchText').innerText = `You and ${name} liked each other!`;
            document.getElementById('matchModal').style.display = 'flex';
        }

        function closeMatch() {
            document.getElementById('matchModal').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
